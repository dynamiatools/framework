view: config
id: EntityFileCFG
messages: tools.dynamia.modules.entityfile
fields:
  entityFileStorage:
    label: Storage
    component: storagebox
    params:
      parameterName: DEFAULT_STORAGE_ID
      cacheable: true
  filesLocation:
    label: Files Location
    description: Server directory in wich will be saved
    component: directorybox
    params:
      parameterName: LOCAL_FILES_LOCATION
      cacheable: true
  reportsLocation:
    label: Reports Location
    description: Server directory in wich will loaded
    component: directorybox
    params:
      parameterName: GLOBAL_REPORTS_LOCATION
      cacheable: true
  contextPath:
    component: textbox
    params:
      parameterName: LOCAL_CONTEXT_PATH
      cacheable: true
  useHttps:
    label: Use HTTPS for Local Storage
    component: checkbox
    params:
      parameterName: LOCAL_USE_HTTPS
      cacheable: true
  forceStorage:
    label: Force Use of Selected Storage
    component: checkbox
    params:
      parameterName: FORCE_STORAGE
      cacheable: true


  s3BucketName:
    label: Bucket Name
    params:
      parameterName: AWS_S3_BUCKET
      cacheable: true
  s3Region:
    label: Region
    params:
      parameterName: AWS_S3_REGION
      defaultValue: us-east-1
      cacheable: true
  s3User:
    label: Identity
    params:
      parameterName: AWS_ACCESS_KEY_ID
      cacheable: true
  s3Secret:
    label: Secret
    params:
      parameterName: AWS_SECRET_KEY
      cacheable: true

  s3Endpoint:
    label: Endpoint Override
    description: Optional endpoint override for S3 compatible storage
    params:
      parameterName: AWS_S3_OVERRIDE_ENDPOINT
      cacheable: true
      span: 2

  sfsUrl:
    label: Server URL
    description: Base URL of the simple-file-server instance, e.g. http://files.example.com:8080
    params:
      parameterName: SFS_URL
      cacheable: true
      span: 2
  sfsBucket:
    label: Bucket
    params:
      parameterName: SFS_BUCKET
      cacheable: true
  sfsIdentity:
    label: Identity
    params:
      parameterName: SFS_IDENTITY
      cacheable: true
  sfsSecret:
    label: Secret
    params:
      parameterName: SFS_SECRET
      cacheable: true

groups:
  s3Config:
    label: S3 Compatible Storage
    fields: [ s3BucketName,s3Region,s3User,s3Secret,s3Endpoint ]
  sfsConfig:
    label: Remote Simple File Storage
    fields: [ sfsUrl,sfsBucket,sfsIdentity,sfsSecret ]

layout:
  columns: 4